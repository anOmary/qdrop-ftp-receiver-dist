name: Publish v1.0.0 Release

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/release-v1.0.0.yml"
      - "latest.yml"
      - "QDrop-FTP-Receiver-Windows-1.0.0-Setup.exe"
      - "QDrop-FTP-Receiver-Windows-1.0.0-Setup.exe.blockmap"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.0.0 >/dev/null 2>&1; then
            gh release upload v1.0.0 \
              "QDrop-FTP-Receiver-Windows-1.0.0-Setup.exe" \
              "QDrop-FTP-Receiver-Windows-1.0.0-Setup.exe.blockmap" \
              "latest.yml" \
              --clobber
          else
            gh release create v1.0.0 \
              "QDrop-FTP-Receiver-Windows-1.0.0-Setup.exe" \
              "QDrop-FTP-Receiver-Windows-1.0.0-Setup.exe.blockmap" \
              "latest.yml" \
              --title "QDrop FTP Receiver v1.0.0" \
              --notes "Release v1.0.0 for QDrop FTP Receiver auto update."
          fi
